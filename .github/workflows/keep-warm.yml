name: Keep Render Warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
    steps:
      - name: Ping backend health endpoint
        if: env.HEALTH_URL != ''
        run: |
          echo "Pinging $HEALTH_URL"
          curl -fsS "$HEALTH_URL" || true
